<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mochamad Izza Zulfikar Sya'roni</title>
    <link rel="icon" type="image/x-icon" href="assets/img/favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <!-- framework tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- cdn framework jquery -->
    <script src="https://code.jquery.com/jquery-3.6.1.js"
        integrity="sha256-3zlB5s2uwoUzrXK3BT7AX3FyvojsraNFxCc2vC/7pNI=" crossorigin="anonymous"></script>

    <!-- customized script -->
    <script src="assets/js/script.js"></script>

    <!-- customized style -->
    <link href="assets/css/style.css" rel="stylesheet">
    <link href="assets/css/style-animation.css" rel="stylesheet">

</head>

<body>
    <!-- top navbar -->
    <nav class="bg-white shadow-lg">
        <div class="max-w-6xl mx-auto px-4">
            <div class="flex justify-between">
                <div class="flex space-x-7">
                    <!-- Website Logo -->
                    <div>
                        <a href="https://eazycchi.github.io/" class="flex items-center py-4 px-2">
                            <img src="assets/img/LogoMochi.png" alt="Logo" class="h-8 w-8 mr-2" />
                            <span class="font-semibold text-gray-500 text-lg">mochizzazs_</span>
                        </a>
                    </div>
                </div>
                <!-- Navbar items -->
                <div class="hidden md:flex items-center space-x-3 ">
                    <a href="" id="menuTentang"
                        class="menu py-4 px-2 text-green-500 border-b-4 border-green-500 font-semibold hover:text-green-500 transition duration-300">Tentang</a>
                    <a href="" id="menuProject"
                        class="menu py-4 px-2 font-semibold hover:text-green-500 transition duration-300">Project</a>
                </div>

                <!-- Mobile menu button -->
                <div class="md:hidden flex items-center">
                    <button class="outline-none mobile-menu-button">
                        <svg class="w-6 h-6 text-gray-500" x-show="!showMenu" fill="none" stroke-linecap="round"
                            stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" stroke="currentColor">
                            <path d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- mobile menu -->
        <div class="hidden mobile-menu">
            <ul class="">
                <li><a href="" id="menuTentang-mobile"
                        class="menu block text-sm px-2 py-4 text-white bg-green-500 font-semibold hover:bg-green-500 transition duration-300">Tentang</a>
                </li>
                <li><a href="" id="menuProject-mobile"
                        class="menu block text-sm px-2 py-4 hover:bg-green-500 transition duration-300">Project</a></li>
            </ul>
        </div>

        <!-- script toggle mobile -->
        <script>
            const btn = document.querySelector("button.mobile-menu-button");
            const menu = document.querySelector(".mobile-menu");

            btn.addEventListener("click", () => {
                menu.classList.toggle("hidden");
            });
        </script>
    </nav>

    <!-- body -->
    <div id="content"></div>
</body>


</html>
